    // הנה התיקון שהכנסתי לפונקציה quoteToStock (שורה 519 בערך):
    function quoteToStock(q, sess){
      if (!q || !q.symbol) return null; // הגנה נגד נתונים חסרים
      
      return {
        ticker: q.symbol,
        sess: sess,
        price: q.regularMarketPrice || 0,
        chg: q.regularMarketChangePercent || 0,
        chgd: q.regularMarketChange || 0,
        vol: (q.regularMarketVolume || 0) / 1e6,
        mcap: (q.marketCap || 0) / 1e6,
        float: (q.floatShares || q.sharesOutstanding || 0) / 1e6 || 1,
        short: (q.shortPercentOfFloat || 0) * 100,
        news: 'any',
        headlines: [],
      };
    }

    // הנה התיקון שהכנסתי ל-runScan (שורה 567 בערך):
    // שים לב שהוספתי .filter(s => s !== null) בסוף

       liveStocks = quotes.map(q => quoteToStock(q, sess)).filter(s => s !== null);
